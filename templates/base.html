<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polish Practice</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4f8;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #e63946;
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    header a { color: white; text-decoration: none; font-size: 1.4rem; font-weight: 700; }
    header span { opacity: 0.8; font-size: 0.9rem; }

    main {
      max-width: 680px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 36px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    h1 { font-size: 1.6rem; margin-bottom: 8px; }
    h2 { font-size: 1.25rem; margin-bottom: 20px; color: #444; }

    .btn {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 12px;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: #e63946;
      color: white;
      box-shadow: 0 4px 12px rgba(230,57,70,0.35);
    }
    .btn-primary:hover { background: #c1121f; }

    .btn-secondary {
      background: #eee;
      color: #333;
    }
    .btn-secondary:hover { background: #ddd; }

    .btn-success {
      background: #2d9e5f;
      color: white;
      box-shadow: 0 4px 12px rgba(45,158,95,0.35);
    }

    .progress-bar-wrap {
      background: #e0e0e0;
      border-radius: 99px;
      height: 10px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #e63946;
      border-radius: 99px;
      transition: width 0.3s;
    }

    .feedback-correct {
      background: #d4edda;
      border: 2px solid #2d9e5f;
      border-radius: 12px;
      padding: 16px 20px;
      margin-top: 20px;
      color: #155724;
      font-weight: 600;
    }
    .feedback-wrong {
      background: #f8d7da;
      border: 2px solid #e63946;
      border-radius: 12px;
      padding: 16px 20px;
      margin-top: 20px;
      color: #721c24;
    }
    .feedback-wrong .answer { font-weight: 700; font-size: 1.1rem; margin-top: 6px; }
    .feedback-wrong .note { margin-top: 8px; font-size: 0.9rem; opacity: 0.85; }

    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      font-size: 1.1rem;
      border: 2px solid #ddd;
      border-radius: 12px;
      margin-top: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #e63946; }

    .options { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; }
    .option-btn {
      padding: 14px 20px;
      border: 2px solid #ddd;
      border-radius: 12px;
      background: white;
      font-size: 1rem;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .option-btn:hover { border-color: #e63946; background: #fff5f5; }
    .option-btn.selected-correct { border-color: #2d9e5f; background: #d4edda; }
    .option-btn.selected-wrong { border-color: #e63946; background: #f8d7da; }
    .option-btn.reveal-correct { border-color: #2d9e5f; background: #d4edda; }

    .meta { font-size: 0.85rem; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    .prompt { font-size: 1.4rem; font-weight: 600; margin-top: 8px; line-height: 1.4; }
    .hint { margin-top: 8px; font-size: 0.95rem; color: #888; }

    .score-badge {
      display: inline-block;
      background: #e63946;
      color: white;
      border-radius: 99px;
      padding: 4px 14px;
      font-size: 0.85rem;
      font-weight: 700;
      margin-left: auto;
    }

    .header-row {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }

    select {
      width: 100%;
      padding: 12px 16px;
      font-size: 1rem;
      border: 2px solid #ddd;
      border-radius: 12px;
      margin-top: 8px;
      margin-bottom: 20px;
      background: white;
      cursor: pointer;
    }

    label { font-weight: 600; display: block; margin-top: 16px; }

    .mode-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 8px;
      margin-bottom: 24px;
    }
    .mode-option { display: none; }
    .mode-option + label {
      display: block;
      padding: 16px;
      border: 2px solid #ddd;
      border-radius: 12px;
      cursor: pointer;
      text-align: center;
      font-weight: 600;
      transition: border-color 0.15s, background 0.15s;
    }
    .mode-option:checked + label { border-color: #e63946; background: #fff5f5; color: #e63946; }
    .mode-option + label:hover { border-color: #e63946; }

    .big-score {
      font-size: 4rem;
      font-weight: 800;
      color: #e63946;
      text-align: center;
      margin: 20px 0 8px;
    }
    .big-score-label { text-align: center; color: #666; margin-bottom: 28px; font-size: 1.1rem; }
    .results-actions { display: flex; gap: 12px; justify-content: center; margin-top: 28px; }
  </style>
</head>
<body>
  <header>
    <a href="/">🇵🇱 Polish Practice</a>
    <a href="/stats" style="color:white;text-decoration:none;font-size:0.95rem;opacity:0.85;margin-left:8px">Stats</a>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
