<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
  <title>Polish Practice</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#e63946">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4f8;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #e63946;
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    header a { color: white; text-decoration: none; font-size: 1.4rem; font-weight: 700; }
    header span { opacity: 0.8; font-size: 0.9rem; }

    main {
      max-width: 680px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 36px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    h1 { font-size: 1.6rem; margin-bottom: 8px; }
    h2 { font-size: 1.25rem; margin-bottom: 20px; color: #444; }

    .btn {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 12px;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: #e63946;
      color: white;
      box-shadow: 0 4px 12px rgba(230,57,70,0.35);
    }
    .btn-primary:hover { background: #c1121f; }

    .btn-secondary {
      background: #eee;
      color: #333;
    }
    .btn-secondary:hover { background: #ddd; }

    .btn-success {
      background: #2d9e5f;
      color: white;
      box-shadow: 0 4px 12px rgba(45,158,95,0.35);
    }

    .progress-bar-wrap {
      background: #e0e0e0;
      border-radius: 99px;
      height: 10px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #e63946;
      border-radius: 99px;
      transition: width 0.3s;
    }

    .feedback-correct {
      background: #d4edda;
      border: 2px solid #2d9e5f;
      border-radius: 12px;
      padding: 16px 20px;
      margin-top: 20px;
      color: #155724;
      font-weight: 600;
    }
    .feedback-wrong {
      background: #f8d7da;
      border: 2px solid #e63946;
      border-radius: 12px;
      padding: 16px 20px;
      margin-top: 20px;
      color: #721c24;
    }
    .feedback-wrong .answer { font-weight: 700; font-size: 1.1rem; margin-top: 6px; }
    .feedback-wrong .note { margin-top: 8px; font-size: 0.9rem; opacity: 0.85; }

    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      font-size: 1.1rem;
      border: 2px solid #ddd;
      border-radius: 12px;
      margin-top: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #e63946; }

    .options { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; }
    .option-btn {
      padding: 14px 20px;
      border: 2px solid #ddd;
      border-radius: 12px;
      background: white;
      font-size: 1rem;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      width: 100%;
    }
    .option-btn:hover { border-color: #e63946; background: #fff5f5; }
    .option-btn.selected-correct { border-color: #2d9e5f; background: #d4edda; }
    .option-btn.selected-wrong { border-color: #e63946; background: #f8d7da; }
    .option-btn.reveal-correct { border-color: #2d9e5f; background: #d4edda; }

    .meta { font-size: 0.85rem; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    .prompt { font-size: 1.4rem; font-weight: 600; margin-top: 8px; line-height: 1.4; }
    .hint { margin-top: 8px; font-size: 0.95rem; color: #888; }

    .score-badge {
      display: inline-block;
      background: #e63946;
      color: white;
      border-radius: 99px;
      padding: 4px 14px;
      font-size: 0.85rem;
      font-weight: 700;
      margin-left: auto;
    }

    .header-row {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }

    select {
      width: 100%;
      padding: 12px 16px;
      font-size: 1rem;
      border: 2px solid #ddd;
      border-radius: 12px;
      margin-top: 8px;
      margin-bottom: 20px;
      background: white;
      cursor: pointer;
    }

    label { font-weight: 600; display: block; margin-top: 16px; }

    .mode-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 8px;
      margin-bottom: 24px;
    }
    .mode-option { display: none; }
    .mode-option + label {
      display: block;
      padding: 16px;
      border: 2px solid #ddd;
      border-radius: 12px;
      cursor: pointer;
      text-align: center;
      font-weight: 600;
      transition: border-color 0.15s, background 0.15s;
    }
    .mode-option:checked + label { border-color: #e63946; background: #fff5f5; color: #e63946; }
    .mode-option + label:hover { border-color: #e63946; }

    .big-score {
      font-size: 4rem;
      font-weight: 800;
      color: #e63946;
      text-align: center;
      margin: 20px 0 8px;
    }
    .big-score-label { text-align: center; color: #666; margin-bottom: 28px; font-size: 1.1rem; }
    .results-actions { display: flex; gap: 12px; justify-content: center; margin-top: 28px; }

    /* Gapped word */
    .char-cell-wrap { display: inline-flex; flex-wrap: wrap; gap: 4px; margin-top: 20px; align-items: center; }
    .char-fixed {
      display: inline-flex; align-items: center; justify-content: center;
      width: 38px; height: 46px; background: #f0f4f8; border-radius: 8px;
      font-size: 1.4rem; font-weight: 700; color: #333;
    }
    .char-space { display: inline-block; width: 14px; }
    .char-input {
      width: 38px; height: 46px; text-align: center; padding: 0;
      border: 2px solid #e63946; border-radius: 8px;
      font-size: 1.4rem; font-weight: 700; color: #333; outline: none;
    }
    .char-input:focus { border-color: #c1121f; box-shadow: 0 0 0 3px rgba(230,57,70,0.2); }

    /* Stats */
    .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px; }
    .stat-box { border-radius: 12px; padding: 20px 16px; text-align: center; }
    .stat-num { font-size: 2.2rem; font-weight: 800; }
    .stat-label { font-size: 0.85rem; font-weight: 600; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-new     { background: #f0f4f8; color: #555; }
    .stat-learning { background: #fff8e1; color: #b45309; }
    .stat-mastered { background: #e8f5e9; color: #2d9e5f; }

    .forecast { display: flex; gap: 8px; align-items: flex-end; height: 120px; }
    .forecast-col { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; }
    .forecast-bar-wrap { flex: 1; width: 100%; display: flex; align-items: flex-end; background: #f0f4f8; border-radius: 6px 6px 0 0; overflow: hidden; }
    .forecast-bar { width: 100%; background: #e63946; border-radius: 4px 4px 0 0; min-height: 0; transition: height 0.3s; }
    .forecast-today .forecast-bar { background: #c1121f; }
    .forecast-count { font-size: 0.8rem; font-weight: 700; color: #555; margin-top: 4px; height: 16px; }
    .forecast-label { font-size: 0.8rem; color: #888; font-weight: 600; }
    .forecast-today .forecast-label { color: #e63946; font-weight: 800; }

    .ch-table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
    .ch-table th { color: #999; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; padding: 0 8px 10px; font-weight: 600; }
    .ch-table td { padding: 10px 8px; border-top: 1px solid #f0f0f0; vertical-align: middle; }
    .ch-table .num { text-align: center; color: #555; }

    .mini-bar-wrap { display: flex; height: 8px; border-radius: 99px; overflow: hidden; background: #e0e0e0; }
    .mini-bar-green { background: #2d9e5f; height: 100%; }
    .mini-bar-amber { background: #f59e0b; height: 100%; }

    /* Sticky action bar — pins input+button above the keyboard on mobile */
    .question-actions {
      position: sticky;
      bottom: 0;
      background: white;
      padding: 16px 0 8px;
      margin-top: 16px;
      box-shadow: 0 -12px 16px white;
    }

    @media (max-width: 480px) {
      main { margin: 16px auto; }
      .card { padding: 24px 20px; }
      .ch-table th:nth-child(3), .ch-table td:nth-child(3),
      .ch-table th:nth-child(4), .ch-table td:nth-child(4) { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <a href="#" id="nav-home">🇵🇱 Polish Practice</a>
    <a href="#" id="nav-stats" style="color:white;text-decoration:none;font-size:0.95rem;opacity:0.85;margin-left:8px">Stats</a>
  </header>
  <main id="main"></main>

  <script src="srs.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');

      // Show reload banner when a new SW takes over (update deployed).
      // Guard with hadController so we don't show on first install.
      let hadController = !!navigator.serviceWorker.controller;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (hadController) showUpdateBanner();
        hadController = true;
      });
    }

    function showUpdateBanner() {
      const b = document.createElement('div');
      b.style.cssText = [
        'position:fixed', 'bottom:0', 'left:0', 'right:0',
        'background:#2e7d32', 'color:#fff',
        'padding:12px 16px',
        'display:flex', 'justify-content:space-between', 'align-items:center',
        'z-index:9999', 'font-size:0.9rem', 'gap:12px',
      ].join(';');
      b.innerHTML =
        '<span>App updated \u2014 your study progress is safe and won\'t be affected.</span>' +
        '<button onclick="location.reload()" style="background:#fff;color:#2e7d32;border:none;' +
        'padding:6px 14px;border-radius:4px;cursor:pointer;font-weight:bold;white-space:nowrap;">' +
        'Reload</button>';
      document.body.appendChild(b);
    }
  </script>
</body>
</html>
